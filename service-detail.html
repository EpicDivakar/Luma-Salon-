<!DOCTYPE html>

  <link rel="icon" type="image/webp" href="images/lumaa-logo-white.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&family=Playfair+Display:ital,wght@0,600;1,700&family=Jost:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #EED9BF; --sage: #9CA175; --offwhite: #F1F1F1;
      --earth: #937B67; --deep: #34382A; --ink: #2B2922; --white: #FFFFFF;
      --serif: 'Playfair Display', serif; --sans: 'Jost', sans-serif;
    }
    body { background: var(--offwhite); font-family: var(--sans); color: var(--ink); }
    a { text-decoration: none; color: inherit; }
    img { display: block; }

    .sp-nav {
      background: var(--white); padding: 14px 48px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(43,41,34,0.08);
      position: sticky; top: 0; z-index: 100;
    }
    .sp-logo { height: 34px; width: auto; }
    .sp-nav-links { display: flex; gap: 32px; }
    .sp-nav-links a { font-size: 0.82rem; letter-spacing: 0.08em; color: rgba(43,41,34,0.65); transition: color .2s; }
    .sp-nav-links a:hover { color: var(--ink); }

    .sp-hero { background: var(--white); padding: 44px 48px 36px; border-bottom: 1px solid rgba(43,41,34,0.08); }
    .sp-back {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--sage); font-weight: 600; margin-bottom: 18px; transition: gap .2s;
    }
    .sp-back:hover { gap: 11px; }
    .sp-eyebrow {
      font-size: 0.68rem; letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--earth); font-weight: 600; margin-bottom: 10px;
    }
    .sp-hero h1 {
      font-family: var(--serif); font-weight: 600;
      font-size: clamp(2rem, 4vw, 3rem); color: var(--ink); letter-spacing: -0.01em;
      margin-bottom: 12px;
    }
    .sp-desc { font-size: 0.95rem; color: rgba(43,41,34,0.62); line-height: 1.7; max-width: 640px; }

    .sp-body { max-width: 1140px; margin: 0 auto; padding: 48px 40px 80px; }
    .detail-gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .gallery-item { position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; }
    .gallery-item img {
      width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block;
      transition: transform .5s ease;
    }
    .gallery-item:hover img { transform: scale(1.05); }
    .gallery-item .g-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(43,41,34,0.72) 0%, transparent 100%);
      color: var(--cream); font-size: 0.75rem; letter-spacing: 0.14em;
      text-transform: uppercase; padding: 28px 16px 14px;
      opacity: 0; transition: opacity .3s ease;
    }
    .gallery-item:hover .g-label { opacity: 1; }

    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(43,41,34,0.94); z-index: 999;
      align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lb-img { max-width: 88vw; max-height: 88vh; border-radius: 8px; object-fit: contain; }
    .lb-close {
      position: absolute; top: 20px; right: 24px;
      color: rgba(238,217,191,0.7); font-size: 2rem; cursor: pointer; line-height: 1;
      transition: color .2s;
    }
    .lb-close:hover { color: var(--cream); }
    .lb-prev, .lb-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      color: rgba(238,217,191,0.7); font-size: 2.2rem; cursor: pointer;
      background: rgba(43,41,34,0.4); border: none; padding: 12px 16px;
      border-radius: 8px; transition: background .2s, color .2s;
    }
    .lb-prev:hover, .lb-next:hover { background: rgba(43,41,34,0.7); color: var(--cream); }
    .lb-prev { left: 16px; }
    .lb-next { right: 16px; }

    .sp-foot { background: var(--deep); color: rgba(238,217,191,0.5); text-align: center; padding: 20px 40px; font-size: 0.76rem; }
    .sp-foot a { color: rgba(238,217,191,0.7); }

    #notFound { display: none; text-align: center; padding: 80px 20px; }
    #notFound h2 { font-family: var(--serif); color: var(--ink); margin-bottom: 12px; }
    #notFound a { color: var(--sage); text-decoration: underline; }

    @media (max-width: 760px) { .detail-gallery { grid-template-columns: repeat(2,1fr); gap: 10px; } }
    @media (max-width: 480px) { .detail-gallery { grid-template-columns: 1fr; } }
    @media (max-width: 600px) {
      .sp-nav { padding: 14px 24px; }
      .sp-hero { padding: 32px 24px 26px; }
      .sp-body { padding: 32px 20px 60px; }
    }
  </style>

    const lb     = document.getElementById('lightbox');
    const lbImg  = document.getElementById('lbImg');

    function openLightbox(idx) {
      currentIdx = idx;
      lbImg.src = BASE + data.photos[idx].id + Q;
      lbImg.alt = data.photos[idx].label;
      lb.classList.add('open');
    }
    function closeLightbox() { lb.classList.remove('open'); lbImg.src = ''; }
    function prevImg() { currentIdx = (currentIdx - 1 + data.photos.length) % data.photos.length; lbImg.src = BASE + data.photos[currentIdx].id + Q; }
    function nextImg() { currentIdx = (currentIdx + 1) % data.photos.length; lbImg.src = BASE + data.photos[currentIdx].id + Q; }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', prevImg);
    document.getElementById('lbNext').addEventListener('click', nextImg);
    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevImg();
      if (e.key === 'ArrowRight') nextImg();
    });
